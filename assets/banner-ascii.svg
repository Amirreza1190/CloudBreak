<svg viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg" width="900" height="280">
  <defs>
    <!-- Enhanced gradient with smoother transitions -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffcc">
        <animate attributeName="stop-color"
          values="#00ffcc;#00cfff;#a855f7;#ff6b35;#00ffcc"
          dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#a855f7">
        <animate attributeName="stop-color"
          values="#a855f7;#ff0080;#00ffcc;#00cfff;#a855f7"
          dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#ff6b35">
        <animate attributeName="stop-color"
          values="#ff6b35;#00ffcc;#a855f7;#00cfff;#ff6b35"
          dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Enhanced glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle scanline pattern -->
    <pattern id="scan" x="0" y="0" width="100%" height="4" patternUnits="userSpaceOnUse">
      <rect width="100%" height="1" fill="rgba(255,255,255,0.02)"/>
      <rect y="2" width="100%" height="1" fill="rgba(0,0,0,0.3)"/>
    </pattern>

    <!-- Radial background glow -->
    <radialGradient id="bg-glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#00cfff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#050510" stop-opacity="0"/>
    </radialGradient>

    <!-- Text mask -->
    <mask id="textMask">
      <g fill="white" font-family="'Courier New', 'Consolas', monospace" font-size="15" font-weight="bold" letter-spacing="1">
        <text x="63" y="58">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚ēó       ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚ēó   ‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó     ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚ēó</text>
        <text x="60" y="74">‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēź‚ēĚ ‚Ėą‚Ėą‚ēĎ      ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó    ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēź‚ēĚ ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚ēĎ ‚Ėą‚Ėą‚ēĒ‚ēĚ</text>
        <text x="60" y="90">‚Ėą‚Ėą‚ēĎ      ‚Ėą‚Ėą‚ēĎ      ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ ‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ    ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó   ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ</text>
        <text x="60" y="106">‚Ėą‚Ėą‚ēĎ      ‚Ėą‚Ėą‚ēĎ      ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ ‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ    ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēĚ   ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēĎ ‚Ėą‚Ėą‚ēĒ‚ēź‚Ėą‚Ėą‚ēó</text>
        <text x="60" y="122">‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ    ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ ‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēó</text>
        <text x="63" y="138">‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ  ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ   ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ  ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ     ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ  ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ</text>
      </g>
    </mask>
  </defs>

  <!-- Background layers -->
  <rect width="900" height="280" fill="#0a0a15"/>
  <rect width="900" height="280" fill="url(#bg-glow)"/>
  <rect width="900" height="280" fill="url(#scan)"/>

  <!-- Outer border with pulse animation -->
  <rect x="1" y="1" width="898" height="278" rx="6" ry="6"
        fill="none" stroke="url(#g1)" stroke-width="2" stroke-opacity="0.8" filter="url(#glow)">
    <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Inner border -->
  <rect x="6" y="6" width="888" height="268" rx="3" ry="3"
        fill="none" stroke="url(#g1)" stroke-width="0.5" stroke-opacity="0.4"/>

  <!-- Corner accents -->
  <g stroke="url(#g1)" stroke-width="2" fill="none" stroke-opacity="0.9" stroke-linecap="round">
    <polyline points="6,30 6,6 30,6"/>
    <polyline points="870,6 894,6 894,30"/>
    <polyline points="6,250 6,274 30,274"/>
    <polyline points="870,274 894,274 894,250"/>
  </g>

  <!-- Main text with glow -->
  <rect width="900" height="280" fill="url(#g1)" mask="url(#textMask)" filter="url(#glow)" opacity="0.95"/>

  <!-- Bottom tagline -->
  <g font-family="'Courier New', 'Consolas', monospace" font-size="10" fill="url(#g1)" opacity="0.7" text-anchor="middle">
    <text x="450" y="268" letter-spacing="2">
      <tspan fill="#00ffcc">v1.0</tspan>
      <tspan dx="8">¬∑</tspan>
      <tspan dx="8">Free</tspan>
      <tspan dx="8">¬∑</tspan>
      <tspan dx="8">One-Click</tspan>
      <tspan dx="8">¬∑</tspan>
      <tspan dx="8">DPI-Proof</tspan>
      <tspan dx="8">¬∑</tspan>
      <tspan dx="8" fill="#a855f7">Cloudflare Workers</tspan>
    </text>
  </g>

  <!-- Animated corner indicators -->
  <circle cx="20" cy="140" r="2.5" fill="#00ffcc" opacity="0.8">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;3.5;2" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="880" cy="140" r="2.5" fill="#a855f7" opacity="0.8">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3.5;2;3.5" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Decorative side dots -->
  <g opacity="0.5">
    <circle cx="20" cy="100" r="1" fill="#00ffcc">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="180" r="1" fill="#ff6b35">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="3s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="880" cy="100" r="1" fill="#a855f7">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="880" cy="180" r="1" fill="#00cfff">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="3s" begin="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
